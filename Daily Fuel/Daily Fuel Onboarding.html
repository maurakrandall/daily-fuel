<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Daily Fuel — Onboarding Explorations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..600,50..100;1,9..144,300..600,50..100&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;padding:0;height:100%;background:#f0eee9;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;}
  *{box-sizing:border-box}
  /* Tweaks panel */
  .tk{position:fixed;bottom:16px;right:16px;z-index:200;background:#fff;border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,.18);padding:14px;width:240px;font-size:12px;display:none;}
  .tk.on{display:block}
  .tk h4{margin:0 0 10px;font-size:11px;letter-spacing:1.6px;text-transform:uppercase;color:#8a7e6e;font-weight:700}
  .tk label{display:flex;align-items:center;justify-content:space-between;padding:6px 0;cursor:pointer;color:#2b1f12}
  .tk input{accent-color:#1B2A4A}
</style>
</head>
<body>

<div id="root"></div>

<!-- Tweaks panel -->
<div class="tk" id="tk">
  <h4>Tweaks</h4>
  <label><span>Show post-its</span><input type="checkbox" id="tk-notes" checked></label>
  <label><span>Phone chrome</span><input type="checkbox" id="tk-chrome" checked></label>
  <label><span>Focus mode hint</span><input type="checkbox" id="tk-hint" checked></label>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="direction-1-golden-hour.jsx"></script>
<script type="text/babel" src="direction-2-soft-current.jsx"></script>
<script type="text/babel" src="direction-3-ritual.jsx"></script>

<script type="text/babel">
const TWEAKS = /*EDITMODE-BEGIN*/{
  "showNotes": true
}/*EDITMODE-END*/;

function App() {
  const [showNotes, setShowNotes] = React.useState(TWEAKS.showNotes);

  React.useEffect(() => {
    let active = false;
    const handler = (e) => {
      if (!e.data || !e.data.type) return;
      if (e.data.type === '__activate_edit_mode') { active = true; document.getElementById('tk').classList.add('on'); }
      if (e.data.type === '__deactivate_edit_mode') { active = false; document.getElementById('tk').classList.remove('on'); }
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  return (
    <DesignCanvas>
      <DCSection id="intro" title="Daily Fuel · Onboarding" subtitle="Three visual directions, five screens each. Drag labels to reorder · click a card label to focus · ←/→ between screens, ↑/↓ between directions.">
      </DCSection>

      <DCSection id="gh" title="Direction 1 · Golden Hour" subtitle="Warm editorial. Cream + navy + gold. Serif display, soft gradient blobs. The calmest of the three.">
        <DCArtboard id="gh1" label="01 · Landing" width={PHONE_W} height={PHONE_H}><GH_Landing/></DCArtboard>
        <DCArtboard id="gh2" label="02 · Intention" width={PHONE_W} height={PHONE_H}><GH_Goals/></DCArtboard>
        <DCArtboard id="gh3" label="03 · Go-tos" width={PHONE_W} height={PHONE_H}><GH_Foods/></DCArtboard>
        <DCArtboard id="gh4" label="04 · Dietary" width={PHONE_W} height={PHONE_H}><GH_Dietary/></DCArtboard>
        <DCArtboard id="gh5" label="05 · Welcome" width={PHONE_W} height={PHONE_H}><GH_Celebration/></DCArtboard>
        {showNotes && <DCPostIt top={-14} right={-40} rotate={3} width={170}>
          Reframe: Gentle / Steady / Stronger — no numbers up front. Numbers shown as a secondary detail.
        </DCPostIt>}
      </DCSection>

      <DCSection id="sc" title="Direction 2 · Soft Current" subtitle="Teal-led, fluid. Watercolor backdrops, modern sans (Manrope), flowing dot progress. The most contemporary.">
        <DCArtboard id="sc1" label="01 · Landing" width={PHONE_W} height={PHONE_H}><SC_Landing/></DCArtboard>
        <DCArtboard id="sc2" label="02 · Targets" width={PHONE_W} height={PHONE_H}><SC_Goals/></DCArtboard>
        <DCArtboard id="sc3" label="03 · Your kit" width={PHONE_W} height={PHONE_H}><SC_Foods/></DCArtboard>
        <DCArtboard id="sc4" label="04 · Leave out" width={PHONE_W} height={PHONE_H}><SC_Dietary/></DCArtboard>
        <DCArtboard id="sc5" label="05 · All set" width={PHONE_W} height={PHONE_H}><SC_Celebration/></DCArtboard>
        {showNotes && <DCPostIt top={-14} right={-40} rotate={-2} width={180}>
          Macro legend + "kit" metaphor: protein, fiber, both — quietly colour-coded. Teal primary, gold for fiber.
        </DCPostIt>}
      </DCSection>

      <DCSection id="rt" title="Direction 3 · Ritual" subtitle="Deep navy field. Fraunces + JetBrains Mono. Precise geometric glyphs instead of blobs. Feels like a quiet morning practice.">
        <DCArtboard id="rt1" label="01 · Landing" width={PHONE_W} height={PHONE_H}><RT_Landing/></DCArtboard>
        <DCArtboard id="rt2" label="02 · Intention" width={PHONE_W} height={PHONE_H}><RT_Goals/></DCArtboard>
        <DCArtboard id="rt3" label="03 · In your corner" width={PHONE_W} height={PHONE_H}><RT_Foods/></DCArtboard>
        <DCArtboard id="rt4" label="04 · Boundaries" width={PHONE_W} height={PHONE_H}><RT_Dietary/></DCArtboard>
        <DCArtboard id="rt5" label="05 · Day zero" width={PHONE_W} height={PHONE_H}><RT_Celebration/></DCArtboard>
        {showNotes && <DCPostIt top={-14} right={-40} rotate={2} width={180}>
          The bold option. Reframes goals as "intention" and dietary needs as "boundaries" — language matters for this audience.
        </DCPostIt>}
      </DCSection>

      <DCSection id="notes" title="Design notes" subtitle="Rationale & next-step ideas for usability testing.">
        <div style={{ background:'#fff', borderRadius:2, padding:'28px 32px', width:540, boxShadow:'0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06)', fontSize:14, lineHeight:1.6, color:'#2b1f12' }}>
          <div style={{fontSize:11,letterSpacing:1.8,textTransform:'uppercase',color:'#c28a2f',fontWeight:700,marginBottom:14}}>Shared principles</div>
          <ul style={{margin:0,paddingLeft:18}}>
            <li><b>Language:</b> "intention," "in your corner," "boundaries," "leave out" — never "tracking," "goals," "restrictions."</li>
            <li><b>One meaningful question per screen.</b> Goals became a 3-preset preset (gentle / steady / stronger); numbers are secondary, not front-and-center.</li>
            <li><b>"Closing the gap" seeded in the celebration</b> — tomorrow's progress ring shows the concept without teaching it yet.</li>
            <li><b>Skip is a first-class option everywhere.</b> Every screen has a soft out.</li>
            <li><b>Disclaimer present, never dominant.</b> Small, italic, below the fold.</li>
          </ul>
          <div style={{fontSize:11,letterSpacing:1.8,textTransform:'uppercase',color:'#c28a2f',fontWeight:700,margin:'22px 0 14px'}}>Transitions (to prototype next)</div>
          <ul style={{margin:0,paddingLeft:18}}>
            <li>Content fades up 12px; background color/shape parallaxes at ~40% speed → feels premium, meditative.</li>
            <li>Celebration: hero mark (sun / glow / ritual sun) scales from 40% → 100% on entry, 480ms ease-out.</li>
            <li>Pill selection: 120ms scale-down to 0.96, haptic-equivalent micro-tap.</li>
          </ul>
          <div style={{fontSize:11,letterSpacing:1.8,textTransform:'uppercase',color:'#c28a2f',fontWeight:700,margin:'22px 0 14px'}}>Usability test priorities</div>
          <ul style={{margin:0,paddingLeft:18}}>
            <li>Does "intention / in your corner / boundaries" feel warm or cringe? (Ritual vs. Soft Current will tell us.)</li>
            <li>Do presets replace the numeric input, or do users want to see numbers? (Skippable "set exact numbers" link tests demand.)</li>
            <li>Does the tomorrow preview on celebration feel like a payoff — or a premature obligation?</li>
          </ul>
        </div>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
